{% extends "shop/base.html" %}
{% block title %}Contacto{% endblock %}

<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="card shadow-sm border-0 py-5">
            <div class="card-body">
                <h1 class="fw-bold mb-3">Contáctanos</h1>
                <p class="text-muted fs-5 mb-5">¿Tienes alguna duda sobre tus compras o nuestros productos?</p>
                <a href="https://wa.me/1234567890" target="_blank" class="btn btn-success btn-lg px-4 py-3 rounded-pill fw-bold shadow-sm mb-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="28" class="me-2">
                    Escríbenos por WhatsApp
                </a>
                <p class="text-secondary mt-4">También puedes escribirnos a <br><strong class="text-dark fs-5">soporte@mitienda.com</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
