{% extends "shop/base.html" %}

{% block title %}Registro - MyShop{% endblock %}

{% block extra_css %}
<style>
    .auth-form input {
        display: block;
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid #ebebeb;
        border-radius: 4px;
        margin-bottom: 1rem;
        font-family: inherit;
        background-color: #fff;
    }
    .auth-form input:focus {
        outline: none;
        border-color: #0a0a0a;
    }
    .auth-form label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: #0a0a0a;
    }
    .auth-form ul.errorlist {
        color: #dc3545;
        font-size: 0.8rem;
        padding-left: 1rem;
    }
    /* Fix the helptext of Django register form */
    .auth-form .helptext {
        display: block;
        font-size: 0.75rem;
        color: #666;
        margin-top: -0.6rem;
        margin-bottom: 1rem;
        line-height: +1.3;
    }
    .auth-form ul {
        margin-top: -0.6rem;
        margin-bottom: 1rem;
        font-size: 0.75rem;
        color: #666;
        padding-left: 1.2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5">
        <div class="card shadow-sm border" style="border-radius: 8px;">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-1 text-center" style="letter-spacing: -1px;">Crear Cuenta</h2>
                <p class="text-muted text-center mb-4">Súmate a MyShop y realiza tus compras seguras</p>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold mt-3" style="border-radius: 4px;">Completar Registro</button>
                </form>
                <div class="text-center mt-4 pt-2 border-top">
                    <p class="text-muted mb-0 mt-3" style="font-size: 0.9rem;">¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-dark fw-bold text-decoration-underline">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
