{% extends "shop/base.html" %}

{% block title %}Iniciar Sesión - MyShop{% endblock %}

{% block extra_css %}
<style>
    .auth-form input {
        display: block;
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid #ebebeb;
        border-radius: 4px;
        margin-bottom: 1rem;
        font-family: inherit;
        background-color: #fff;
    }
    .auth-form input:focus {
        outline: none;
        border-color: #0a0a0a;
    }
    .auth-form label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: #0a0a0a;
    }
    .auth-form ul.errorlist {
        color: #dc3545;
        font-size: 0.8rem;
        padding-left: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5">
        <div class="card shadow-sm border" style="border-radius: 8px;">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-1 text-center" style="letter-spacing: -1px;">Bienvenido</h2>
                <p class="text-muted text-center mb-4">Inicia sesión en tu cuenta para continuar</p>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold mt-3" style="border-radius: 4px;">Ingresar al Sistema</button>
                </form>
                <div class="text-center mt-4 pt-2 border-top">
                    <p class="text-muted mb-0 mt-3" style="font-size: 0.9rem;">¿Aún sin cuenta? <a href="{% url 'register' %}" class="text-dark fw-bold text-decoration-underline">Regístrate gratis</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
